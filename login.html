<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Asesores — Rizkora</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #064c78;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
    }

    .logo-circle {
      width: 64px;
      height: 64px;
      background: #064c78;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-circle span {
      color: #fff59d;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #064c78;
      margin-bottom: 4px;
    }

    p.sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    .btn-login {
      display: inline-block;
      width: 100%;
      padding: 12px 20px;
      background: #064c78;
      color: #fff59d;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #053a5c; }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 12px;
      color: #9ca3af;
    }

    #loading {
      display: none;
      margin-top: 1rem;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-circle"><span>R</span></div>
      <h1>Portal de Asesores</h1>
      <p class="sub">Diagnóstico Financiero Rizkora<br>Acceso exclusivo para asesores</p>
    </div>

    <button class="btn-login" id="btnLogin" onclick="abrirLogin()">
      Iniciar sesión
    </button>

    <p id="loading">Verificando sesión...</p>

    <p class="footer-note">¿Problemas para acceder? Contacta a tu administrador.</p>
  </div>

  <script>
    netlifyIdentity.on('init', user => {
      if (user) {
        window.location.href = '/asesoria/';
      }
    });

    netlifyIdentity.on('login', user => {
      netlifyIdentity.close();
      window.location.href = '/asesoria/';
    });

    function abrirLogin() {
      netlifyIdentity.open('login');
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('btnLogin').style.display = 'none';

    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('btnLogin').style.display = 'inline-block';
    }, 800);
  </script>
</body>
</html>
